<section class="checkout-summary">
  <h2>Order Summary</h2>
  <ul>
    <li *ngFor="let item of cartItems">
      <span>{{ item.Name }} (x{{ item.Quantity }})</span>
      <span>${{ (item.FinalPrice * item.Quantity).toFixed(2) }}</span>
    </li>
  </ul>
  <p>Subtotal: ${{ itemTotal.toFixed(2) }}</p>
  <p>Shipping: ${{ shipping.toFixed(2) }}</p>
  <p>Tax: ${{ tax.toFixed(2) }}</p>
  <p class="order-total"><strong>Total: ${{ orderTotal.toFixed(2) }}</strong></p>
</section>

<form [formGroup]="checkoutForm" (ngSubmit)="onSubmit()">
  <fieldset class="checkout-form">
    <legend>Shipping Information</legend>

    <label for="fname">
      First Name <span class="required">*</span>
      <input
        id="fname"
        type="text"
        formControlName="fname"
        required
      />
    </label>

    <label for="lname">
      Last Name <span class="required">*</span>
      <input
        id="lname"
        type="text"
        formControlName="lname"
        required
      />
    </label>

    <label for="street">
      Street <span class="required">*</span>
      <input
        id="street"
        type="text"
        formControlName="street"
        required
      />
    </label>

    <label for="city">
      City <span class="required">*</span>
      <input
        id="city"
        type="text"
        formControlName="city"
        required
      />
    </label>

    <label for="state">
      State <span class="required">*</span>
      <input
        id="state"
        type="text"
        formControlName="state"
        required
      />
    </label>

    <label for="zip">
      Zip <span class="required">*</span>
      <input
        id="zip"
        type="text"
        formControlName="zip"
        placeholder="12345"
        required
      />
    </label>
  </fieldset>

  <fieldset class="checkout-form">
    <legend>Payment Information</legend>

    <label for="cardNumber">
      Card Number <span class="required">*</span>
      <input
        id="cardNumber"
        type="text"
        formControlName="cardNumber"
        placeholder="1234567890123456"
        required
      />
    </label>

    <label for="expiration">
      Expiration <span class="required">*</span>
      <input
        id="expiration"
        type="text"
        formControlName="expiration"
        placeholder="MM/YY"
        required
      />
    </label>

    <label for="code">
      Security Code <span class="required">*</span>
      <input
        id="code"
        type="text"
        formControlName="code"
        placeholder="123"
        required
      />
    </label>
  </fieldset>

  <button type="submit" [disabled]="submitting || !checkoutForm.valid">
    {{ submitting ? 'Processing...' : 'Complete Order' }}
  </button>
</form>
